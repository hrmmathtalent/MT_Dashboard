<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math & Science Talent Branch Revenue Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Prompt', 'sans-serif'] },
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-primary: #0b33a0;
      --brand-primary-dark: #071d5c;
      --brand-secondary: #fcb00e;
      --nav-height: 3.5rem;
      --sidebar-width: 16rem;
    }
    body {
      font-family: 'Prompt', sans-serif;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      background-image: radial-gradient(at 0% 0%, hsla(221, 83%, 33%, 0.12) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, hsla(41, 97%, 52%, 0.12) 0px, transparent 50%);
      min-height: 100vh;
      margin: 0;
    }
    .glass-panel {
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 1rem;
      box-shadow: 0 8px 32px 0 rgba(31,38,135,0.07);
    }
    .glass-card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 0.75rem;
      box-shadow: 0 4px 16px 0 rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px 0 rgba(11,51,160,0.15);
    }
    .glass-input {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      outline: none;
      transition: all 0.2s;
    }
    .glass-input:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px rgba(11,51,160,0.1);
    }
    .btn-primary {
      background: linear-gradient(to bottom, var(--brand-primary), var(--brand-primary-dark));
      color: white;
      border: none;
      border-radius: 0.5rem;
      padding: 0.625rem 1.5rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(11,51,160,0.25);
      transition: all 0.25s;
    }
    .btn-primary:hover {
      box-shadow: 0 6px 22px rgba(11,51,160,0.4);
    }
    .btn-glass {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-glass.active {
      background: var(--brand-primary);
      color: white;
      border-color: var(--brand-primary);
    }
    .filter-chip {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(200,200,200,0.5);
      user-select: none;
      margin: 0.2rem;
      transition: all 0.2s;
    }
    .filter-chip.active {
      background: var(--brand-primary);
      color: white;
      border-color: var(--brand-primary);
    }
    .hero-revenue {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .sidebar-link:hover {
      background: rgba(11,51,160,0.06);
    }
    .sidebar-link.active {
      background: rgba(11,51,160,0.12);
      border-left: 3px solid var(--brand-primary);
      font-weight: 600;
    }
    .subject-chip {
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      display: inline-block;
    }
    .math-chip { background: #dbeafe; color: #1e40af; }
    .sci-chip { background: #fee2e2; color: #991b1b; }
    .both-chip { background: #fef08a; color: #854d0e; }
    .status-chip {
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      display: inline-block;
    }
    .status-ต่อ { background: #d1fae5; color: #065f46; }
    .status-ใหม่ { background: #fef3c7; color: #92400e; }
    .toast {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      animation: slideInRight 0.35s;
      backdrop-filter: blur(12px);
    }
    @keyframes slideInRight {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    #sidebar {
      position: fixed;
      top: calc(var(--nav-height) + 0.5rem);
      left: 0;
      height: calc(100vh - var(--nav-height) - 0.5rem);
      width: var(--sidebar-width);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 0.75rem;
      box-shadow: 0 4px 16px 0 rgba(0,0,0,0.05);
      z-index: 90;
      overflow-y: auto;
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform: translateX(0);
      opacity: 1;
      padding: 1rem;
    }
    #sidebar.sidebar-hidden {
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
    }
    #mainContent {
      margin-left: var(--sidebar-width);
      transition: margin-left 0.3s ease;
      padding-top: 0.5rem;
    }
    body.sidebar-hidden #mainContent {
      margin-left: 0;
    }
    @media (max-width: 1024px) {
      #sidebar {
        width: 100vw;
        transform: translateX(-100vw);
        transition: transform 0.3s ease;
        top: var(--nav-height);
        height: calc(100vh - var(--nav-height));
        border-radius: 0;
      }
      #sidebar.open {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }
      #sidebar.sidebar-hidden {
        transform: translateX(-100vw);
        opacity: 0;
        pointer-events: none;
      }
      #mainContent {
        margin-left: 0;
      }
    }
    .data-table th {
      font-size: 0.75rem;
      font-weight: 600;
      color: white;
      white-space: nowrap;
      background: linear-gradient(to bottom, var(--brand-primary), var(--brand-primary-dark));
    }
    .data-table td {
      font-size: 0.8rem;
      vertical-align: middle;
    }
    .table-header-colored thead th {
      background: linear-gradient(to bottom, var(--brand-primary), var(--brand-primary-dark));
      color: white;
      padding: 0.5rem;
    }
    #loadingLine {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 4px;
      background: linear-gradient(90deg, var(--brand-primary), var(--brand-secondary));
      z-index: 10000;
      transition: width 0.4s ease;
    }
    .user-badge { text-align: center; }
    .chart-type-btn {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 0.25rem;
      padding: 0.2rem 0.4rem;
      cursor: pointer;
      font-size: 0.7rem;
      margin-left: 0.2rem;
      transition: background 0.2s;
    }
    .chart-type-btn.active {
      background: var(--brand-primary);
      color: white;
    }
  </style>
</head>
<body class="sidebar-visible" id="bodyEl">

  <div id="loadingLine"></div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="fixed inset-0 z-[9999] flex items-center justify-center" style="background: rgba(0,0,0,0.2); backdrop-filter: blur(4px);">
    <div class="glass-panel w-full max-w-md p-8">
      <div class="flex justify-center mb-5">
        <img id="loginLogo" src="https://mathtalentschool.com/th/wp-content/uploads/2023/06/Math-Small-300x300.png"
             class="w-20 h-20 rounded-full border-4 border-white/60 shadow-lg object-cover">
      </div>
      <h2 class="text-2xl font-bold text-center text-gray-800 mb-1">Math & Science Talent</h2>
      <p class="text-center text-gray-500 text-sm mb-6">Math & Science Talent Branch Revenue Dashboard</p>
      <div class="space-y-4">
        <input type="text" id="loginUsername" class="glass-input w-full" placeholder="Username">
        <input type="password" id="loginPassword" class="glass-input w-full" placeholder="Password">
        <button id="btnLogin" class="btn-primary w-full py-3 text-lg flex items-center justify-center gap-2" onclick="handleLogin()">
          <span data-i18n="login">เข้าสู่ระบบ</span>
          <div id="loginSpinner" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        </button>
      </div>
      <p id="loginError" class="text-red-500 text-sm text-center mt-3 hidden"></p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden min-h-screen flex flex-col">
    <!-- NAVBAR -->
    <nav class="glass-panel fixed top-0 left-0 right-0 z-50 mx-2 mt-2 px-2 py-1 flex items-center justify-between" style="height:var(--nav-height);">
      <div class="flex items-center gap-1">
        <button id="menuToggle" class="btn-glass px-2 py-1 text-lg" onclick="toggleSidebar()">☰</button>
        <img id="navbarLogo" src="https://mathtalentschool.com/th/wp-content/uploads/2023/06/Math-Small-300x300.png"
             class="w-8 h-8 rounded-full border-2 border-white/50 shadow object-cover">
        <span class="font-bold text-gray-800 text-xs sm:text-sm hidden sm:inline">Dashboard</span>
        <div class="flex items-center gap-0.5 ml-2">
          <button class="btn-glass text-xs px-1.5 py-0.5 subject-toggle active" data-subject="all" onclick="setSubjectFilter('all')">All</button>
          <button class="btn-glass text-xs px-1.5 py-0.5 subject-toggle" data-subject="math" onclick="setSubjectFilter('math')">Math</button>
          <button class="btn-glass text-xs px-1.5 py-0.5 subject-toggle" data-subject="science" onclick="setSubjectFilter('science')">Sci</button>
        </div>
        <div id="ceoBranchDropdownContainer" class="hidden ml-1 flex items-center gap-1">
          <select id="ceoBranchSelect" class="glass-input text-xs py-0.5" onchange="onBranchChange()">
            <option value="all" data-i18n="allBranches">ทุกสาขา</option>
          </select>
          <label class="text-xs flex items-center gap-1">
            <input type="checkbox" id="ceoOnlyCheckbox" onchange="onCeoOnlyChange()"> <span data-i18n="ceoOnly">เฉพาะ CEO</span>
          </label>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button id="langSwitcher" class="btn-glass text-xs px-2 py-1" onclick="toggleLanguage()">🌐 <span id="langLabel">TH</span></button>
      </div>
    </nav>

    <div style="margin-top: var(--nav-height);" class="flex flex-1">
      <aside id="sidebar" class="glass-card p-3 flex flex-col gap-1">
        <div class="flex lg:hidden justify-end mb-2">
          <button class="btn-glass px-2 py-1" onclick="toggleSidebar()">✕</button>
        </div>
        <a class="sidebar-link active" data-page="dashboard" onclick="navigateTo('dashboard')">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
          <span data-i18n="dashboard">แดชบอร์ด</span>
        </a>
        <a class="sidebar-link" data-page="transactions" onclick="navigateTo('transactions')">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
          <span data-i18n="transactions">ตารางรายละเอียด</span>
        </a>
        <a class="sidebar-link" data-page="newStudents" onclick="navigateTo('newStudents')">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
          <span data-i18n="newStudents">นักเรียนใหม่ประจำปีนี้</span>
        </a>
        <a class="sidebar-link" data-page="allStudents" onclick="navigateTo('allStudents')">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          <span data-i18n="allStudents">นักเรียนทั้งหมด / Leads</span>
        </a>
        <div class="mt-auto pt-4 border-t border-gray-200">
          <div id="userBadge" class="text-sm font-medium text-gray-600 bg-white/40 px-3 py-1 rounded-full block mb-2 user-badge"></div>
          <button class="btn-glass text-sm px-3 py-1.5 text-red-500 w-full" onclick="handleLogout()" data-i18n="logout">ออกจากระบบ</button>
        </div>
      </aside>

      <main id="mainContent" class="flex-1 overflow-y-auto p-3 lg:p-5 space-y-4"></main>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script>
    // ========== CONFIG ==========
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbybEA3GOcHQqVB5lJP5g8xI21h9zlF4EodO9DfyIsteqceQfwjiRAc04ZLyQ58dtwuZSw/exec';
    const REGISTRY_SHEET_ID = '13WTZRbhtxPIMnuhnfQOReW_Uz-_tFcFzR_d1_yrUHj8';

    // ========== I18N ==========
    const translations = {
      th: {
        login: 'เข้าสู่ระบบ', logout: 'ออกจากระบบ', dashboard: 'แดชบอร์ด', transactions: 'ตารางรายละเอียด',
        newStudents: 'นักเรียนใหม่ประจำปีนี้', allStudents: 'นักเรียนทั้งหมด / Leads', revenue: 'รายได้รวม',
        royaltyFee: 'Royalty Fee 15%', fixCost: 'Fix Cost', netProfit: 'กำไรสุทธิ', retention: 'Retention',
        churn: '% ไม่ต่อ', courseType: 'ประเภทคอร์ส', channel: 'ช่องทาง', school: 'โรงเรียน', trend: 'แนวโน้มรายปี',
        branchRevenue: 'รายได้ต่อสาขา', popularCourse: 'คอร์สขายดี(ชั่วโมง)', gradeDist: 'ชั้นเรียน', trialResult: 'ผลทดลองเรียน',
        all: 'All', math: 'Math', science: 'Science', ceoOnly: 'เฉพาะ CEO', allBranches: 'ทุกสาขา',
        search: 'ค้นหา...', hideCols: 'ซ่อนคอลัมน์:', grade: 'ชั้น', channel: 'ช่องทาง', learningFormat: 'รูปแบบ',
        status: 'สถานะ', payment: 'วิธีจ่าย', date: 'วันที่', studentName: 'ชื่อ', hours: 'ชั่วโมง',
        totalNet: 'รวมสุทธิ', bookFee: 'ค่าหนังสือ', courseFee: 'ค่าคอร์ส', fullName: 'ชื่อ-นามสกุล',
        nickname: 'ชื่อเล่น', subject: 'วิชา', trialDate: 'วันที่ทดลอง', startDate: 'วันที่เริ่ม',
        endDate: 'วันที่หมด', teacher: 'ครู', recordDate: 'วันที่', schoolName: 'โรงเรียน', phone: 'เบอร์',
        lineId: 'ไลน์', facebook: 'FB', trialDateTime: 'วัน/เวลาทดลอง', knownFrom: 'รู้จักผ่าน',
        trialDone: 'ทดลองแล้ว', notTrial: 'ยังไม่ทดลอง', trialNoEnroll: 'ทดลองไม่ลง', trialEnroll: 'ทดลองลง',
        branchName: 'สาขา', paymentMethod: 'วิธีจ่าย', trialResultMerged: 'ผลทดลองเรียน',
        month: 'รายเดือน', year: 'รายปี', equipmentFee: 'ค่าอุปกรณ์'
      },
      en: {
        login: 'Login', logout: 'Logout', dashboard: 'Dashboard', transactions: 'Transactions',
        newStudents: 'New Students This Year', allStudents: 'All Students / Leads', revenue: 'Total Revenue',
        royaltyFee: 'Royalty Fee 15%', fixCost: 'Fix Cost', netProfit: 'Net Profit', retention: 'Retention',
        churn: 'Churn %', courseType: 'Course Type', channel: 'Channel', school: 'School', trend: 'Yearly Trend',
        branchRevenue: 'Branch Revenue', popularCourse: 'Popular Courses (hrs)', gradeDist: 'Student Grades',
        trialResult: 'Trial Result', all: 'All', math: 'Math', science: 'Science', ceoOnly: 'CEO Only',
        allBranches: 'All Branches', search: 'Search...', hideCols: 'Hide Columns:', grade: 'Grade',
        channel: 'Channel', learningFormat: 'Format', status: 'Status', payment: 'Payment', date: 'Date',
        studentName: 'Name', hours: 'Hours', totalNet: 'Total', bookFee: 'Book Fee', courseFee: 'Course Fee',
        fullName: 'Full Name', nickname: 'Nickname', subject: 'Subject', trialDate: 'Trial Date',
        startDate: 'Start Date', endDate: 'End Date', teacher: 'Teacher', recordDate: 'Date',
        schoolName: 'School', phone: 'Phone', lineId: 'Line', facebook: 'FB', trialDateTime: 'Trial Date/Time',
        knownFrom: 'Known From', trialDone: 'Trial Done', notTrial: 'Not Trial', trialNoEnroll: 'No Enroll',
        trialEnroll: 'Trial Enroll', branchName: 'Branch', paymentMethod: 'Payment Method', trialResultMerged: 'Trial Result',
        month: 'Monthly', year: 'Yearly', equipmentFee: 'Equipment Fee'
      }
    };
    function t(key) { return translations[currentLanguage]?.[key] || key; }

    // ========== STATE ==========
    let currentUser = null, currentLanguage = 'th', currentPage = 'dashboard', subjectFilter = 'all';
    let viewMode = 'month', selectedMonthOffset = 0, selectedYearOffset = 0;
    let allDashboardData = null, chartInstances = {};
    let fixCostData = JSON.parse(localStorage.getItem('fixCostData') || '{}');
    let selectedBranchName = 'all', ceoOnly = false;
    let hiddenTransCols = [], hiddenNewCols = [], hiddenAllCols = [];
    let transChipFilters = { grade: [], channel: [], learningFormat: [], status: [], payment: [] };
    let newChipFilters = { teacher: [], nearExpire: false };
    let allChipFilters = { grade: [], school: [], knownFrom: [], trialResult: [] };
    let searchTerm = '';
    let chartTypes = { popular: 'bar', grade: 'bar', trial: 'bar', channel: 'bar' }; // default bar

    // ========== UI HELPERS ==========
    function showToast(msg, type='success') {
      const el = document.createElement('div');
      el.className = `toast bg-${type==='success'?'green-500':'yellow-500'} text-white`;
      el.innerText = msg; document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => { el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2500);
    }
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (window.innerWidth <= 1024) {
        sidebar.classList.toggle('open');
      } else {
        sidebar.classList.toggle('sidebar-hidden');
        document.body.classList.toggle('sidebar-hidden', sidebar.classList.contains('sidebar-hidden'));
      }
    }
    function navigateTo(page) {
      currentPage = page;
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
      document.querySelector(`.sidebar-link[data-page="${page}"]`)?.classList.add('active');
      document.getElementById('sidebar').classList.remove('open');
      renderCurrentPage();
    }
    function toggleLanguage() {
      currentLanguage = currentLanguage === 'th' ? 'en' : 'th';
      document.getElementById('langLabel').innerText = currentLanguage.toUpperCase();
      renderCurrentPage();
    }

    function updateTheme() {
      const root = document.documentElement;
      if (subjectFilter === 'science') {
        root.style.setProperty('--brand-primary', '#d22121');
        root.style.setProperty('--brand-primary-dark', '#8b0000');
      } else {
        root.style.setProperty('--brand-primary', '#0b33a0');
        root.style.setProperty('--brand-primary-dark', '#071d5c');
      }
    }

    // ========== AUTH ==========
    function saveLoginState() { if (currentUser) localStorage.setItem('currentUser', JSON.stringify(currentUser)); }
    function clearLoginState() { localStorage.removeItem('currentUser'); }
    async function handleLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errorEl = document.getElementById('loginError');
      errorEl.classList.add('hidden');
      if (!username || !password) { errorEl.innerText='กรุณากรอกข้อมูล'; errorEl.classList.remove('hidden'); return; }
      document.getElementById('loginSpinner').classList.remove('hidden');
      document.getElementById('btnLogin').disabled = true;
      try {
        const resp = await fetch(GAS_URL, {
          method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body: new URLSearchParams({ action:'login', username, password, registryId:REGISTRY_SHEET_ID })
        });
        const data = await resp.json();
        if (data.success) {
          currentUser = data.user;
          document.getElementById('userBadge').innerText = `${currentUser.username} (${currentUser.role})`;
          document.getElementById('loginScreen').style.display='none';
          document.getElementById('mainApp').classList.remove('hidden');
          if (currentUser.role === 'CEO') initBranchDropdown();
          saveLoginState();
          await loadDashboardData();
          navigateTo('dashboard');
          showToast('โหลดข้อมูลสำเร็จ');
        } else {
          errorEl.innerText = data.message || 'เข้าสู่ระบบไม่สำเร็จ'; errorEl.classList.remove('hidden');
        }
      } catch(e) { errorEl.innerText = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'; errorEl.classList.remove('hidden'); }
      finally { document.getElementById('loginSpinner').classList.add('hidden'); document.getElementById('btnLogin').disabled = false; }
    }
    function handleLogout() {
      currentUser=null; allDashboardData=null;
      Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch(e){}});
      chartInstances={};
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('mainApp').classList.add('hidden');
      clearLoginState();
    }

    // ========== DATA LOADING ==========
    function setLoadingProgress(p) { document.getElementById('loadingLine').style.width = p+'%'; }
    async function loadDashboardData() {
      if (!GAS_URL||!currentUser) return;
      setLoadingProgress(0); let prog=0;
      const interval = setInterval(()=>{ prog+=Math.random()*15; if(prog>90)prog=90; setLoadingProgress(prog); },300);
      const branchIds = getActiveBranchIds();
      try {
        const resp = await fetch(GAS_URL, {
          method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body: new URLSearchParams({ action:'dashboard', registryId:REGISTRY_SHEET_ID, branchIds: JSON.stringify(branchIds) })
        });
        allDashboardData = await resp.json();
      } catch(e) { console.error(e); }
      finally { clearInterval(interval); setLoadingProgress(100); setTimeout(()=>setLoadingProgress(0),1500); }
    }
    function getActiveBranchIds() {
      if (!currentUser?.branches) return [];
      let branches = currentUser.branches;
      if (currentUser.role === 'CEO' && ceoOnly) branches = branches.filter(b => b.isCeoBranch);
      return branches.map(b => b.spreadsheetId).filter(Boolean);
    }

    // ========== FILTERS & HELPERS ==========
    function setSubjectFilter(type) {
      subjectFilter=type;
      document.querySelectorAll('.subject-toggle').forEach(b=>b.classList.toggle('active', b.dataset.subject===type));
      const logo=document.getElementById('navbarLogo'), loginLogo=document.getElementById('loginLogo');
      if (type==='all'||type==='math') {
        if(logo)logo.src='https://mathtalentschool.com/th/wp-content/uploads/2023/06/Math-Small-300x300.png';
        if(loginLogo)loginLogo.src='https://mathtalentschool.com/th/wp-content/uploads/2023/06/Math-Small-300x300.png';
      } else {
        if(logo)logo.src='https://mathtalentschool.com/th/wp-content/uploads/2023/06/logo_sc-1-300x300.png';
        if(loginLogo)loginLogo.src='https://mathtalentschool.com/th/wp-content/uploads/2023/06/logo_sc-1-300x300.png';
      }
      updateTheme();
      renderCurrentPage();
    }
    function initBranchDropdown() {
      if (!currentUser||currentUser.role!=='CEO') return;
      document.getElementById('ceoBranchDropdownContainer').classList.remove('hidden');
      buildBranchDropdown();
    }
    function buildBranchDropdown() {
      const sel=document.getElementById('ceoBranchSelect');
      sel.innerHTML='';
      const optAll=document.createElement('option'); optAll.value='all'; optAll.text=t('allBranches'); sel.appendChild(optAll);
      let branches = currentUser.branches;
      if (ceoOnly) branches = branches.filter(b => b.isCeoBranch);
      branches.forEach(b=>{
        const o=document.createElement('option'); o.value=b.name||b.spreadsheetId; o.text=b.name||b.spreadsheetId;
        sel.appendChild(o);
      });
      if (!branches.some(b => (b.name||b.spreadsheetId) === selectedBranchName)) selectedBranchName = 'all';
      sel.value = selectedBranchName;
    }
    function onBranchChange() { selectedBranchName = document.getElementById('ceoBranchSelect')?.value || 'all'; renderCurrentPage(); }
    function onCeoOnlyChange() {
      ceoOnly = document.getElementById('ceoOnlyCheckbox')?.checked || false;
      buildBranchDropdown();
      renderCurrentPage();
    }
    function filterByBranch(txList) {
      if (!currentUser||currentUser.role!=='CEO'||selectedBranchName==='all') return txList;
      return txList.filter(t=> (t.branchName||t.branch||'').trim()===selectedBranchName);
    }
    function getSubjectClass(subject) {
      const s=(subject||'').toLowerCase();
      const hasMath=s.includes('คณิต'), hasSci=s.includes('วิทย์');
      if (hasMath&&hasSci) return 'both-chip';
      if (hasMath) return 'math-chip';
      if (hasSci) return 'sci-chip';
      return '';
    }
    function isRowValid(row) { const name=row.studentName||row.fullName||row.nickname||''; return name.trim()!==''&&name.trim()!=='-'; }
    function parseDate(str) {
      if(!str) return null;
      const parts=String(str).split(/[\/\-.]/);
      if(parts.length===3){
        let d=parseInt(parts[0]), m=parseInt(parts[1])-1, y=parseInt(parts[2]);
        if(isNaN(d)||isNaN(m)||isNaN(y)) return null;
        if(y>2400) y-=543;
        return new Date(y,m,d);
      }
      return null;
    }
    function normalizeGrade(g) { return (g||'').replace(/\./g,'').replace(/\s/g,'').toUpperCase(); }
    function getGradeByNickname(nickname) {
      if (!allDashboardData?.students) return '';
      const found = allDashboardData.students.find(s=> (s.nickname||'').trim()===nickname.trim());
      return found ? (found.grade||'') : '';
    }
    function isNearExpire(endDateStr) {
      if (!endDateStr) return false;
      const d = parseDate(endDateStr);
      if (!d) return false;
      const today = new Date(); today.setHours(0,0,0,0);
      return (d - today) / (1000*60*60*24) <= 30 && d >= today;
    }
    function splitMultiValues(value) {
      return String(value||'').split(/[\/,]+/).map(s=>s.trim()).filter(Boolean);
    }
    function matchesMultiValue(recordValue, chipValue) {
      return splitMultiValues(recordValue).includes(chipValue);
    }
    function isTrialTrue(val) { return String(val||'').trim() !== ''; }
    function getTrialResultMerged(s) {
      if (isTrialTrue(s.trialDone)) return 'trialDone';
      if (isTrialTrue(s.notTrial)) return 'notTrial';
      if (isTrialTrue(s.trialNoEnroll)) return 'trialNoEnroll';
      if (isTrialTrue(s.trialEnroll)) return 'trialEnroll';
      return '';
    }

    // ========== RENDER ==========
    function renderCurrentPage() {
      if (!currentUser) return;
      updateTheme();
      const main = document.getElementById('mainContent');
      const scrollTop = main.scrollTop;
      switch (currentPage) {
        case 'dashboard': renderDashboard(); break;
        case 'transactions': renderTransactionsPage(); break;
        case 'newStudents': renderNewStudentsPage(); break;
        case 'allStudents': renderAllStudentsPage(); break;
      }
      requestAnimationFrame(() => { main.scrollTop = scrollTop; });
    }

    function getSelectedMonthDate() { const now=new Date(); now.setMonth(now.getMonth()+selectedMonthOffset); return now; }
    function getSelectedYear() { return new Date().getFullYear() + selectedYearOffset; }
    function changePeriod(dir) {
      if (viewMode==='month') selectedMonthOffset+=dir;
      else selectedYearOffset+=dir;
      renderCurrentPage();
    }
    function toggleViewMode(mode) {
      viewMode=mode;
      if (mode==='year') selectedMonthOffset=0; else selectedYearOffset=0;
      renderCurrentPage();
    }

    // ========== LIVE SEARCH (Pure DOM) ==========
    function performLiveSearch(containerId, term) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const rows = container.querySelectorAll('tbody tr');
      const lowerTerm = term.toLowerCase();
      rows.forEach(row => {
        const text = Array.from(row.cells).map(cell => cell.textContent).join(' ').toLowerCase();
        row.style.display = text.includes(lowerTerm) ? '' : 'none';
      });
    }

    // ========== TRANSACTION TABLE BUILD (with live search integration) ==========
    function buildTransactionTable(transactions, page='dashboard') {
      let tx = transactions.filter(isRowValid);
      if (subjectFilter==='math') tx = tx.filter(t=> (t.subject||'').includes('คณิต'));
      else if (subjectFilter==='science') tx = tx.filter(t=> (t.subject||'').includes('วิทย์'));
      const f = transChipFilters;
      if (f.grade.length) tx = tx.filter(t=> f.grade.some(g => normalizeGrade(getGradeByNickname(t.studentName)) === normalizeGrade(g)));
      if (f.channel.length) tx = tx.filter(t=> f.channel.some(c => matchesMultiValue(t.channel, c)));
      if (f.learningFormat.length) tx = tx.filter(t=> f.learningFormat.some(l => matchesMultiValue(t.learningFormat, l)));
      if (f.status.length) tx = tx.filter(t=> f.status.includes(t.status));
      if (f.payment.length) {
        tx = tx.filter(t=> {
          const pay = (parseFloat(t.bankTransfer)||0)>0 ? 'โอน' : (parseFloat(t.creditCard)||0)>0 ? 'บัตร' : '';
          return f.payment.includes(pay);
        });
      }
      const showBranch = (currentUser?.role === 'CEO' && selectedBranchName === 'all');
      const colOptions = [
        ...(showBranch ? ['branchName'] : []),
        'date','studentName','grade','channel','subject','learningFormat','hours','status','payment','totalNet','bookFee','courseFee','equipmentFee'
      ];
      const tableId = `trans-table-${page}`;
      let html = `<div class="flex flex-wrap gap-2 mb-2 items-center"><span class="text-xs">${t('hideCols')}</span>`;
      colOptions.forEach(col=>{
        const checked = hiddenTransCols.includes(col) ? '' : 'checked';
        html += `<label class="text-xs"><input type="checkbox" ${checked} onchange="toggleTransCol('${col}')"> ${t(col)}</label>`;
      });
      html += `</div>`;
      html += renderTransFilterChips(tx);
      html += `<input type="text" class="glass-input w-full mb-2" placeholder="${t('search')}" oninput="performLiveSearch('${tableId}', this.value)" autocomplete="off">`;
      html += `<div class="overflow-x-auto"><table id="${tableId}" class="data-table w-full table-header-colored"><thead><tr>`;
      colOptions.forEach(c=>{ if (!hiddenTransCols.includes(c)) html += `<th>${t(c)}</th>`; });
      html += `</tr></thead><tbody>`;
      tx.slice(0,200).forEach(t=>{
        const grade = getGradeByNickname(t.studentName);
        const payMethod = (parseFloat(t.bankTransfer)||0)>0 ? 'โอน' : (parseFloat(t.creditCard)||0)>0 ? 'บัตร' : '';
        const rowTotal = (parseFloat(t.totalNet)||0) + (parseFloat(t.additionalFee)||0) + (parseFloat(t.equipmentFee)||0);
        html += `<tr>`;
        colOptions.forEach(c=>{
          if (hiddenTransCols.includes(c)) return;
          switch(c) {
            case 'branchName': html += `<td><span class="subject-chip" style="background:#e0e7ff;color:#3730a3;">${t.branchName||t.branch||''}</span></td>`; break;
            case 'date': html += `<td>${t.date}</td>`; break;
            case 'studentName': html += `<td>${t.studentName}</td>`; break;
            case 'grade': html += `<td>${grade}</td>`; break;
            case 'channel': html += `<td>${t.channel}</td>`; break;
            case 'subject': html += `<td><span class="subject-chip ${getSubjectClass(t.subject)}">${t.subject}</span></td>`; break;
            case 'learningFormat': html += `<td>${t.learningFormat}</td>`; break;
            case 'hours': html += `<td>${t.hours}</td>`; break;
            case 'status': html += `<td><span class="status-chip status-${t.status}">${t.status}</span></td>`; break;
            case 'payment': html += `<td>${payMethod}</td>`; break;
            case 'totalNet': html += `<td>฿${rowTotal.toLocaleString()}</td>`; break;
            case 'bookFee': html += `<td>฿${(parseFloat(t.bookFee)||0).toLocaleString()}</td>`; break;
            case 'courseFee': html += `<td>฿${(parseFloat(t.courseFee)||0).toLocaleString()}</td>`; break;
            case 'equipmentFee': html += `<td>฿${(parseFloat(t.equipmentFee)||0).toLocaleString()}</td>`; break;
          }
        });
        html += `</tr>`;
      });
      html += `</tbody></table></div>`;
      return html;
    }
    function toggleTransCol(col) {
      if (hiddenTransCols.includes(col)) hiddenTransCols = hiddenTransCols.filter(c=>c!==col);
      else hiddenTransCols.push(col);
      renderCurrentPage();
    }
    function renderTransFilterChips(tx) {
      const allGrades = [...new Set(tx.map(t=>getGradeByNickname(t.studentName)).filter(Boolean))];
      const allChannels = [...new Set(tx.flatMap(t=> splitMultiValues(t.channel)).filter(Boolean))];
      const allFormats = [...new Set(tx.flatMap(t=> splitMultiValues(t.learningFormat)).filter(Boolean))];
      const allStatuses = [...new Set(tx.map(t=>t.status).filter(Boolean))];
      const allPayments = [...new Set(tx.map(t=> (parseFloat(t.bankTransfer)||0)>0?'โอน':(parseFloat(t.creditCard)||0)>0?'บัตร':'').filter(Boolean))];
      let html = `<div class="flex flex-wrap gap-1 mb-2">`;
      html += `<span class="text-xs">${t('grade')}:</span>` + allGrades.map(g=>`<span class="filter-chip ${transChipFilters.grade.some(fg=>normalizeGrade(fg)===normalizeGrade(g))?'active':''}" onclick="toggleChipFilter('trans','grade','${g}')">${g}</span>`).join('');
      html += `<span class="text-xs ml-2">${t('channel')}:</span>` + allChannels.map(c=>`<span class="filter-chip ${transChipFilters.channel.includes(c)?'active':''}" onclick="toggleChipFilter('trans','channel','${c}')">${c}</span>`).join('');
      html += `<span class="text-xs ml-2">${t('learningFormat')}:</span>` + allFormats.map(f=>`<span class="filter-chip ${transChipFilters.learningFormat.includes(f)?'active':''}" onclick="toggleChipFilter('trans','learningFormat','${f}')">${f}</span>`).join('');
      html += `<span class="text-xs ml-2">${t('status')}:</span>` + allStatuses.map(s=>`<span class="filter-chip ${transChipFilters.status.includes(s)?'active':''}" onclick="toggleChipFilter('trans','status','${s}')">${s}</span>`).join('');
      html += `<span class="text-xs ml-2">${t('payment')}:</span>` + allPayments.map(p=>`<span class="filter-chip ${transChipFilters.payment.includes(p)?'active':''}" onclick="toggleChipFilter('trans','payment','${p}')">${p}</span>`).join('');
      html += `</div>`;
      return html;
    }
    function toggleChipFilter(table, field, value) {
      const obj = table==='trans'? transChipFilters : table==='new'? newChipFilters : allChipFilters;
      if (!obj[field]) obj[field]=[];
      const idx = obj[field].findIndex(v => normalizeGrade(v) === normalizeGrade(value));
      if (idx > -1) obj[field].splice(idx,1);
      else obj[field].push(value);
      renderCurrentPage();
    }

    // ========== DASHBOARD ==========
    let tableVisible = true;
    function renderDashboard() {
      if (!allDashboardData) return;
      let tx = filterByBranch(allDashboardData.transactions||[]);
      if (subjectFilter==='math') tx = tx.filter(t=> (t.subject||'').includes('คณิต'));
      else if (subjectFilter==='science') tx = tx.filter(t=> (t.subject||'').includes('วิทย์'));
      const targetDate = viewMode==='month'? getSelectedMonthDate() : null;
      const targetYear = viewMode==='year'? getSelectedYear() : null;
      if (viewMode==='month') {
        const y=targetDate.getFullYear(), m=targetDate.getMonth();
        tx = tx.filter(t=>{const d=parseDate(t.date); return d&&d.getFullYear()===y&&d.getMonth()===m;});
      } else {
        tx = tx.filter(t=>{const d=parseDate(t.date); return d&&d.getFullYear()===targetYear;});
      }

      const totalRevenue = tx.reduce((s,t) => {
        const T = parseFloat(t.totalNet)||0;
        const S = parseFloat(t.additionalFee)||0;
        const O = parseFloat(t.equipmentFee)||0;
        if (subjectFilter === 'math') return s + T;
        else return s + T + S + O;
      }, 0);
      const royaltyFee = totalRevenue*0.15;
      const periodKey = viewMode==='month'? `${targetDate.getFullYear()}-${String(targetDate.getMonth()+1).padStart(2,'0')}` : `${targetYear}`;
      const fixCost = fixCostData[`${getActiveBranchIds().join('|')}_${periodKey}`]||0;
      const netProfit = totalRevenue - fixCost;
      const renewal = tx.filter(t=>(t.status||'').trim()==='ต่อ').length;
      const newCnt = tx.filter(t=>(t.status||'').trim()==='ใหม่').length;
      const retention = (renewal+newCnt)? (renewal/(renewal+newCnt)*100):0;
      let html = `
      <div class="glass-panel p-4">
        <div class="flex items-center gap-2 mb-2">
          <button class="btn-glass text-xs px-2 py-1 ${viewMode==='month'?'active':''}" onclick="toggleViewMode('month')">${t('month')}</button>
          <button class="btn-glass text-xs px-2 py-1 ${viewMode==='year'?'active':''}" onclick="toggleViewMode('year')">${t('year')}</button>
          <div class="flex gap-1">
            <button class="btn-glass text-xs px-2 py-1" onclick="changePeriod(-1)">◀</button>
            <span class="text-sm font-semibold">${viewMode==='month'? periodKey : targetYear}</span>
            <button class="btn-glass text-xs px-2 py-1" onclick="changePeriod(1)">▶</button>
          </div>
        </div>
        <div class="hero-revenue">฿${totalRevenue.toLocaleString('th-TH',{minimumFractionDigits:2})}</div>
        <p class="text-lg font-semibold">${t('royaltyFee')}: <span style="color:var(--brand-primary)">฿${royaltyFee.toLocaleString('th-TH',{minimumFractionDigits:2})}</span></p>
        <div class="mt-2 flex items-center gap-3">
          <label class="text-sm font-medium">${t('fixCost')}</label>
          <input type="number" id="fixCostInput" class="glass-input w-32" value="${fixCost}" onchange="updateFixCost(this.value)">
          <span class="text-xl font-bold text-green-700">${t('netProfit')}: ฿${netProfit.toLocaleString('th-TH',{minimumFractionDigits:2})}</span>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="glass-card p-4"><h3>${t('revenue')}</h3><p class="text-2xl font-bold">฿${totalRevenue.toLocaleString()}</p></div>
        <div class="glass-card p-4"><h3>% ${t('retention')}</h3><p class="text-2xl font-bold">${retention.toFixed(1)}%</p></div>
        <div class="glass-card p-4"><h3>${t('churn')}</h3><p class="text-2xl font-bold">${(100-retention).toFixed(1)}%</p></div>
      </div>`;
      if (currentUser.role==='CEO' && selectedBranchName==='all') {
        html += `<div class="glass-card p-4 mt-4"><div class="flex justify-between items-center mb-2"><h3>${t('branchRevenue')}</h3><div>${chartTypeButtons('branch')}</div></div><canvas id="branchRevenueChart" style="max-height:300px;"></canvas></div>`;
      }
      if (viewMode==='year') {
        html += `<div class="glass-card p-4 mt-4"><div class="flex justify-between items-center mb-2"><h3>${t('trend')}</h3></div><canvas id="yearTrendChart" style="max-height:200px;"></canvas></div>`;
      }
      html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
        <div class="glass-card p-4"><div class="flex justify-between items-center mb-2"><h3>${t('popularCourse')}</h3><div>${chartTypeButtons('popular')}</div></div><canvas id="popularCourseChart"></canvas></div>
        <div class="glass-card p-4"><div class="flex justify-between items-center mb-2"><h3>${t('channel')}</h3><div>${chartTypeButtons('channel')}</div></div><canvas id="channelChart"></canvas></div>
        <div class="glass-card p-4"><div class="flex justify-between items-center mb-2"><h3>${t('gradeDist')}</h3><div>${chartTypeButtons('grade')}</div></div><canvas id="gradeChart"></canvas></div>
        <div class="glass-card p-4"><div class="flex justify-between items-center mb-2"><h3>${t('trialResult')}</h3><div>${chartTypeButtons('trial')}</div></div><canvas id="trialResultChart"></canvas></div>
      </div>
      <div class="glass-panel p-4 mt-4">
        <div class="flex justify-between mb-2 items-center">
          <span class="font-semibold">${t('transactions')}</span>
          <button class="btn-glass text-sm" onclick="tableVisible=!tableVisible; document.getElementById('trans-table-dashboard').parentElement.classList.toggle('hidden',!tableVisible);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
        <div class="${tableVisible?'':'hidden'}">
          ${buildTransactionTable(tx, 'dashboard')}
        </div>
      </div>`;
      document.getElementById('mainContent').innerHTML = html;
      setTimeout(()=>{
        if (currentUser.role==='CEO' && selectedBranchName==='all') renderBranchChart(tx);
        if (viewMode==='year') renderYearTrendChart(tx);
        renderPopularCourseChart();
        renderChannelChart(tx);
        renderGradeChart();
        renderTrialResultChart();
      },100);
    }
    function updateFixCost(val) {
      const periodKey = viewMode==='month'? `${getSelectedMonthDate().getFullYear()}-${String(getSelectedMonthDate().getMonth()+1).padStart(2,'0')}` : `${getSelectedYear()}`;
      const key = `${getActiveBranchIds().join('|')}_${periodKey}`;
      fixCostData[key] = parseFloat(val)||0;
      localStorage.setItem('fixCostData', JSON.stringify(fixCostData));
      renderCurrentPage();
    }
    function chartTypeButtons(chartName) {
      const types = ['bar','doughnut','line'];
      return types.map(t=>`<button class="chart-type-btn ${chartTypes[chartName]===t?'active':''}" onclick="changeChartType('${chartName}','${t}')">${t==='bar'?'▊':t==='doughnut'?'◯':'〰'}</button>`).join('');
    }
    function changeChartType(name, type) {
      chartTypes[name] = type;
      // re-render the specific chart only
      const tx = allDashboardData?.transactions || [];
      if (name==='branch' && currentUser.role==='CEO') renderBranchChart(tx);
      else if (name==='popular') renderPopularCourseChart();
      else if (name==='channel') renderChannelChart(tx);
      else if (name==='grade') renderGradeChart();
      else if (name==='trial') renderTrialResultChart();
    }
    function renderBranchChart(tx) {
      const canvas = document.getElementById('branchRevenueChart'); if(!canvas) return;
      if(chartInstances.branch) chartInstances.branch.destroy();
      let branches = currentUser.branches;
      if (ceoOnly) branches = branches.filter(b => b.isCeoBranch);
      const branchNames = branches.map(b => b.name || b.spreadsheetId);
      const map = {};
      tx.forEach(t=>{
        const b = t.branchName||t.branch||'';
        if (branchNames.includes(b)) {
          const T = parseFloat(t.totalNet)||0, S = parseFloat(t.additionalFee)||0, O = parseFloat(t.equipmentFee)||0;
          map[b] = (map[b]||0) + T + S + O;
        }
      });
      const labels = Object.keys(map), rev = labels.map(l=>map[l]), royalty = rev.map(r=>r*0.15);
      chartInstances.branch = new Chart(canvas, {
        type: chartTypes.branch || 'bar', data:{ labels, datasets:[
          {label:'รายรับอื่น',data:rev.map(r=>r-r*0.15),backgroundColor:'rgba(11,51,160,0.7)'},
          {label:'Royalty 15%',data:royalty,backgroundColor:'rgba(252,176,14,0.9)'}
        ]}, options:{responsive:true, scales:{x:{stacked:true},y:{stacked:true}}}
      });
    }
    function renderYearTrendChart(tx) {
      const canvas = document.getElementById('yearTrendChart'); if(!canvas) return;
      if(chartInstances.yearTrend) chartInstances.yearTrend.destroy();
      const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
      const year = viewMode==='year' ? getSelectedYear() : new Date().getFullYear();
      const data = new Array(12).fill(0);
      tx.forEach(t=>{
        const d = parseDate(t.date);
        if (d && d.getFullYear()===year) {
          const T = parseFloat(t.totalNet)||0, S = parseFloat(t.additionalFee)||0, O = parseFloat(t.equipmentFee)||0;
          data[d.getMonth()] += T + S + O;
        }
      });
      chartInstances.yearTrend = new Chart(canvas, {
        type:'line', data:{ labels: months, datasets:[{ data, borderColor:'#0b33a0', backgroundColor:'rgba(11,51,160,0.1)', fill:true, tension:0.4, pointRadius:4 }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }
      });
    }
    function renderPopularCourseChart() {
      const canvas=document.getElementById('popularCourseChart'); if(!canvas) return;
      if(chartInstances.popular) chartInstances.popular.destroy();
      let newStu = allDashboardData?.newStudents||[];
      if (subjectFilter==='math') newStu = newStu.filter(s=> (s.subject||'').includes('คณิต'));
      else if (subjectFilter==='science') newStu = newStu.filter(s=> (s.subject||'').includes('วิทย์'));
      const filtered = newStu.filter(s=>{ const sub=(s.subject||'').toLowerCase(); return !sub.includes('แคมป์')&&!sub.includes('kangaroo'); });
      const targetHours = [8,12,24,32,48,30,50,100];
      const groups = { เดี่ยว: [8,12,24,32,48], กลุ่ม: [30,50,100] };
      const counts = { เดี่ยว: {}, กลุ่ม: {} };
      filtered.forEach(s=>{
        const h = parseFloat(s.hours)||0;
        const format = (s.learningFormat||'').includes('กลุ่ม')? 'กลุ่ม' : 'เดี่ยว';
        if (groups[format].includes(h)) {
          counts[format][h] = (counts[format][h]||0) + 1;
        }
      });
      const labels = targetHours.filter(h => groups.เดี่ยว.includes(h) || groups.กลุ่ม.includes(h))
                                 .filter(h => (counts.เดี่ยว[h]||0) + (counts.กลุ่ม[h]||0) > 0);
      const dataเดี่ยว = labels.map(h => counts.เดี่ยว[h] || 0);
      const dataกลุ่ม = labels.map(h => counts.กลุ่ม[h] || 0);
      chartInstances.popular = new Chart(canvas, {
        type: chartTypes.popular || 'bar', data:{ labels, datasets:[
          {label:'เดี่ยว',data:dataเดี่ยว,backgroundColor:'#22c55e'},
          {label:'กลุ่ม',data:dataกลุ่ม,backgroundColor:'#fcb00e'}
        ]}, options:{responsive:true, scales:{x:{stacked:true},y:{stacked:true}}, plugins:{legend:{position:'bottom'}}}
      });
    }
    function renderChannelChart(tx) {
      const canvas=document.getElementById('channelChart'); if(!canvas) return;
      if(chartInstances.channel) chartInstances.channel.destroy();
      const channelCounts = {};
      tx.forEach(t=>{ const c = (t.channel||'ไม่ระบุ').trim(); channelCounts[c] = (channelCounts[c]||0)+1; });
      const labels = Object.keys(channelCounts).sort((a,b)=>channelCounts[b]-channelCounts[a]).slice(0,8);
      const data = labels.map(l=>channelCounts[l]);
      chartInstances.channel = new Chart(canvas, {
        type: chartTypes.channel || 'bar', data:{ labels, datasets:[{ data, backgroundColor:'#0b33a0' }] },
        options:{ responsive:true, plugins:{legend:{display:false}} }
      });
    }
    function renderGradeChart() {
      const canvas=document.getElementById('gradeChart'); if(!canvas) return;
      if(chartInstances.grade) chartInstances.grade.destroy();
      let students = allDashboardData?.students||[];
      if (subjectFilter==='math') students = students.filter(s=> hasMathKeyword(s));
      else if (subjectFilter==='science') students = students.filter(s=> hasSciKeyword(s));
      const map={}; students.forEach(s=>{ const g=s.grade||'ไม่ระบุ'; map[g]=(map[g]||0)+1; });
      const labels=Object.keys(map), data=labels.map(l=>map[l]);
      chartInstances.grade = new Chart(canvas, {
        type: chartTypes.grade || 'bar', data:{labels, datasets:[{data,backgroundColor:['#3b82f6','#ef4444','#22c55e','#f59e0b','#8b5cf6','#ec4899']}]},
        options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
      });
    }
    function hasMathKeyword(student) {
      const fields = [student.course, student.subject, student.trialDateTime, student.knownFrom].join(' ');
      return fields.includes('คณิต');
    }
    function hasSciKeyword(student) {
      const fields = [student.course, student.subject, student.trialDateTime, student.knownFrom].join(' ');
      return fields.includes('วิทย์');
    }
    function renderTrialResultChart() {
      const canvas=document.getElementById('trialResultChart'); if(!canvas) return;
      if(chartInstances.trial) chartInstances.trial.destroy();
      let students = allDashboardData?.students||[];
      if (subjectFilter==='math') students = students.filter(s=> hasMathKeyword(s));
      else if (subjectFilter==='science') students = students.filter(s=> hasSciKeyword(s));
      let done=0, not=0, noEnroll=0, enroll=0;
      students.forEach(s=>{
        if (isTrialTrue(s.trialDone)) done++;
        if (isTrialTrue(s.notTrial)) not++;
        if (isTrialTrue(s.trialNoEnroll)) noEnroll++;
        if (isTrialTrue(s.trialEnroll)) enroll++;
      });
      chartInstances.trial = new Chart(canvas, {
        type: chartTypes.trial || 'bar', data:{ labels:[t('trialDone'),t('notTrial'),t('trialNoEnroll'),t('trialEnroll')], datasets:[{data:[done,not,noEnroll,enroll],backgroundColor:['#10b981','#f59e0b','#ef4444','#3b82f6']}] },
        options:{plugins:{legend:{display:false}}}
      });
    }

    // ========== OTHER PAGES ==========
    function renderTransactionsPage() {
      if (!allDashboardData) return;
      let tx = filterByBranch(allDashboardData.transactions||[]);
      const targetDate = viewMode==='month'? getSelectedMonthDate() : null;
      const targetYear = viewMode==='year'? getSelectedYear() : null;
      if (viewMode==='month') {
        const y=targetDate.getFullYear(), m=targetDate.getMonth();
        tx = tx.filter(t=>{const d=parseDate(t.date); return d&&d.getFullYear()===y&&d.getMonth()===m;});
      } else {
        tx = tx.filter(t=>{const d=parseDate(t.date); return d&&d.getFullYear()===targetYear;});
      }
      let html = `<div class="glass-panel p-4">
        <div class="flex items-center gap-2 mb-4">
          <button class="btn-glass text-xs px-2 py-1 ${viewMode==='month'?'active':''}" onclick="toggleViewMode('month')">${t('month')}</button>
          <button class="btn-glass text-xs px-2 py-1 ${viewMode==='year'?'active':''}" onclick="toggleViewMode('year')">${t('year')}</button>
          <div class="flex gap-1">
            <button class="btn-glass text-xs px-2 py-1" onclick="changePeriod(-1)">◀</button>
            <span class="text-sm font-semibold">${viewMode==='month'? `${targetDate.getFullYear()}-${String(targetDate.getMonth()+1).padStart(2,'0')}` : targetYear}</span>
            <button class="btn-glass text-xs px-2 py-1" onclick="changePeriod(1)">▶</button>
          </div>
        </div>
        ${buildTransactionTable(tx, 'transactions')}
      </div>`;
      document.getElementById('mainContent').innerHTML = html;
    }
    function renderNewStudentsPage() {
      if (!allDashboardData) return;
      let students = filterByBranch(allDashboardData.newStudents||[]);
      if (subjectFilter==='math') students = students.filter(s=> (s.subject||'').includes('คณิต'));
      else if (subjectFilter==='science') students = students.filter(s=> (s.subject||'').includes('วิทย์'));
      if (newChipFilters.teacher.length) students = students.filter(s=> newChipFilters.teacher.some(t => matchesMultiValue(s.teacher, t)));
      if (newChipFilters.nearExpire) students = students.filter(s=> isNearExpire(s.endDate));
      const showBranch = (currentUser?.role === 'CEO' && selectedBranchName === 'all');
      const colOptions = [...(showBranch ? ['branchName'] : []), 'fullName','nickname','subject','trialDate','startDate','endDate','hours','teacher'];
      const tableId = 'new-stu-table';
      let html = `<div class="glass-panel p-4">
        <h2 class="text-xl font-bold mb-3">${t('newStudents')}</h2>
        <div class="flex flex-wrap gap-2 mb-2"><span class="text-xs">${t('hideCols')}</span>`;
      colOptions.forEach(c=>{ const checked=hiddenNewCols.includes(c)?'':'checked'; html+=`<label class="text-xs"><input type="checkbox" ${checked} onchange="toggleNewCol('${c}')"> ${t(c)}</label>`; });
      html += `</div>`;
      const allTeachers = [...new Set(students.flatMap(s=> splitMultiValues(s.teacher)).filter(Boolean))];
      html += `<div class="flex flex-wrap gap-1 mb-2"><span class="text-xs">${t('teacher')}:</span>`+allTeachers.map(t=>`<span class="filter-chip ${newChipFilters.teacher.includes(t)?'active':''}" onclick="toggleChipFilter('new','teacher','${t}')">${t}</span>`).join('');
      html += `<label class="text-xs ml-2"><input type="checkbox" ${newChipFilters.nearExpire?'checked':''} onchange="newChipFilters.nearExpire=!newChipFilters.nearExpire;renderCurrentPage()"> ใกล้หมด</label></div>`;
      html += `<input type="text" class="glass-input w-full mb-2" placeholder="${t('search')}" oninput="performLiveSearch('${tableId}', this.value)" autocomplete="off">`;
      html += `<div class="overflow-x-auto"><table id="${tableId}" class="data-table w-full table-header-colored"><thead><tr>`;
      colOptions.forEach(c=>{ if (!hiddenNewCols.includes(c)) html += `<th>${t(c)}</th>`; });
      html += `</tr></thead><tbody>`;
      students.forEach(s=>{
        html += '<tr>';
        colOptions.forEach(c=>{
          if (hiddenNewCols.includes(c)) return;
          switch(c) {
            case 'branchName': html += `<td><span class="subject-chip" style="background:#e0e7ff;color:#3730a3;">${s.branchName||''}</span></td>`; break;
            case 'fullName': html += `<td>${s.fullName}</td>`; break;
            case 'nickname': html += `<td>${s.nickname}</td>`; break;
            case 'subject': html += `<td><span class="subject-chip ${getSubjectClass(s.subject)}">${s.subject}</span></td>`; break;
            case 'trialDate': html += `<td>${s.trialDate||''}</td>`; break;
            case 'startDate': html += `<td>${s.startDate}</td>`; break;
            case 'endDate': html += `<td><span class="status-chip ${isNearExpire(s.endDate)?'status-ใหม่':'status-ต่อ'}">${s.endDate}</span></td>`; break;
            case 'hours': html += `<td>${s.hours}</td>`; break;
            case 'teacher': html += `<td><span class="filter-chip">${s.teacher}</span></td>`; break;
          }
        });
        html += '</tr>';
      });
      html += '</tbody></table></div></div>';
      document.getElementById('mainContent').innerHTML = html;
    }
    function toggleNewCol(col) {
      if (hiddenNewCols.includes(col)) hiddenNewCols = hiddenNewCols.filter(c=>c!==col);
      else hiddenNewCols.push(col);
      renderCurrentPage();
    }
    function renderAllStudentsPage() {
      if (!allDashboardData) return;
      let students = filterByBranch(allDashboardData.students||[]);
      if (subjectFilter==='math') students = students.filter(s=> hasMathKeyword(s) || (!hasSciKeyword(s) && !hasMathKeyword(s)));
      else if (subjectFilter==='science') students = students.filter(s=> hasSciKeyword(s) || (!hasSciKeyword(s) && !hasMathKeyword(s)));
      if (allChipFilters.grade.length) students = students.filter(s=> allChipFilters.grade.some(g => splitMultiValues(s.grade).includes(g)));
      const schoolSelect = document.getElementById('allSchoolSelect');
      if (schoolSelect && schoolSelect.value) students = students.filter(s => s.school === schoolSelect.value);
      if (allChipFilters.knownFrom.length) students = students.filter(s=> allChipFilters.knownFrom.some(k => matchesMultiValue(s.knownFrom, k)));
      if (allChipFilters.trialResult.length) {
        students = students.filter(s=> {
          const res = [];
          if (isTrialTrue(s.trialDone)) res.push('done');
          if (isTrialTrue(s.notTrial)) res.push('not');
          if (isTrialTrue(s.trialNoEnroll)) res.push('noenroll');
          if (isTrialTrue(s.trialEnroll)) res.push('enroll');
          return allChipFilters.trialResult.some(r=>res.includes(r));
        });
      }
      const showBranch = (currentUser?.role === 'CEO' && selectedBranchName === 'all');
      const colOptions = [
        ...(showBranch ? ['branchName'] : []),
        'recordDate','nickname','grade','school','course','phone','lineId','facebook','trialDateTime','knownFrom','trialResultMerged'
      ];
      const tableId = 'all-stu-table';
      let html = `<div class="glass-panel p-4"><h2 class="text-xl font-bold mb-3">${t('allStudents')}</h2>`;
      html += `<div class="flex items-center gap-2 mb-4">
        <button class="btn-glass text-xs px-2 py-1 ${viewMode==='month'?'active':''}" onclick="toggleViewMode('month')">${t('month')}</button>
        <button class="btn-glass text-xs px-2 py-1 ${viewMode==='year'?'active':''}" onclick="toggleViewMode('year')">${t('year')}</button>
        <div class="flex gap-1">
          <button class="btn-glass text-xs px-2 py-1" onclick="changePeriod(-1)">◀</button>
          <span class="text-sm font-semibold">${viewMode==='month'? `${getSelectedMonthDate().getFullYear()}-${String(getSelectedMonthDate().getMonth()+1).padStart(2,'0')}` : getSelectedYear()}</span>
          <button class="btn-glass text-xs px-2 py-1" onclick="changePeriod(1)">▶</button>
        </div>
      </div>`;
      html += `<div class="flex flex-wrap gap-2 mb-2"><span class="text-xs">${t('hideCols')}</span>`;
      colOptions.forEach(c=>{ const checked=hiddenAllCols.includes(c)?'':'checked'; html+=`<label class="text-xs"><input type="checkbox" ${checked} onchange="toggleAllCol('${c}')"> ${t(c)}</label>`; });
      html+=`</div>`;
      const allGrades = [...new Set(students.flatMap(s=>splitMultiValues(s.grade)).filter(Boolean))];
      const allKnowns=[...new Set(students.flatMap(s=>splitMultiValues(s.knownFrom)).filter(Boolean))];
      const allSchools=[...new Set(students.map(s=>s.school).filter(Boolean))];
      html+=`<div class="flex flex-wrap gap-1 mb-2">`;
      html+=`<span class="text-xs">${t('grade')}:</span><select id="allGradeSelect" class="glass-input text-xs py-0.5" onchange="allChipFilters.grade = [this.value]; renderCurrentPage()"><option value="">${t('all')}</option>`+allGrades.map(g=>`<option value="${g}">${g}</option>`).join('')+`</select>`;
      html+=`<span class="text-xs ml-2">${t('school')}:</span><select id="allSchoolSelect" class="glass-input text-xs py-0.5" onchange="allChipFilters.school = [this.value]; renderCurrentPage()"><option value="">${t('all')}</option>`+allSchools.map(s=>`<option value="${s}">${s}</option>`).join('')+`</select>`;
      html+=`<span class="text-xs ml-2">${t('knownFrom')}:</span>`+allKnowns.map(k=>`<span class="filter-chip ${allChipFilters.knownFrom.includes(k)?'active':''}" onclick="toggleChipFilter('all','knownFrom','${k}')">${k}</span>`).join('');
      html+=`<span class="text-xs ml-2">${t('trialResult')}:</span>`;
      ['done','not','noenroll','enroll'].forEach(r=>{
        const labels={done:t('trialDone'),not:t('notTrial'),noenroll:t('trialNoEnroll'),enroll:t('trialEnroll')};
        html+=`<span class="filter-chip ${allChipFilters.trialResult.includes(r)?'active':''}" onclick="toggleChipFilter('all','trialResult','${r}')">${labels[r]}</span>`;
      });
      html+=`</div>`;
      html += `<input type="text" class="glass-input w-full mb-2" placeholder="${t('search')}" oninput="performLiveSearch('${tableId}', this.value)" autocomplete="off">`;
      html+=`<div class="overflow-x-auto"><table id="${tableId}" class="data-table w-full table-header-colored"><thead><tr>`;
      colOptions.forEach(c=>{ if (!hiddenAllCols.includes(c)) html += `<th>${t(c)}</th>`; });
      html+='</tr></thead><tbody>';
      students.forEach(s=>{
        const trialMerged = getTrialResultMerged(s);
        const trialChip = trialMerged ? `<span class="subject-chip" style="background:${
          trialMerged==='trialDone'?'#d1fae5;color:#065f46':
          trialMerged==='notTrial'?'#fef3c7;color:#92400e':
          trialMerged==='trialNoEnroll'?'#fee2e2;color:#991b1b':'#dbeafe;color:#1e40af'
        }">${t(trialMerged)}</span>` : '';
        html+='<tr>';
        colOptions.forEach(c=>{
          if (hiddenAllCols.includes(c)) return;
          switch(c) {
            case 'branchName': html+=`<td><span class="subject-chip" style="background:#e0e7ff;color:#3730a3;">${s.branchName||''}</span></td>`; break;
            case 'recordDate': html+=`<td>${s.recordDate}</td>`; break;
            case 'nickname': html+=`<td>${s.nickname}</td>`; break;
            case 'grade': html+=`<td><span class="subject-chip">${s.grade}</span></td>`; break;
            case 'school': html+=`<td><span class="subject-chip">${s.school}</span></td>`; break;
            case 'course': html+=`<td>${s.course}</td>`; break;
            case 'phone': html+=`<td><a href="tel:${s.phone}" class="subject-chip">${s.phone}</a></td>`; break;
            case 'lineId': html+=`<td>${s.lineId}</td>`; break;
            case 'facebook': html+=`<td>${s.facebook}</td>`; break;
            case 'trialDateTime': html+=`<td><span class="subject-chip">${s.trialDateTime}</span></td>`; break;
            case 'knownFrom': html+=`<td><span class="subject-chip">${s.knownFrom}</span></td>`; break;
            case 'trialResultMerged': html+=`<td>${trialChip}</td>`; break;
          }
        });
        html+='</tr>';
      });
      html+='</tbody></table></div></div>';
      document.getElementById('mainContent').innerHTML = html;
      const gradeSelect = document.getElementById('allGradeSelect');
      if (gradeSelect && allChipFilters.grade.length) gradeSelect.value = allChipFilters.grade[0];
      const schoolSelectEl = document.getElementById('allSchoolSelect');
      if (schoolSelectEl && allChipFilters.school.length) schoolSelectEl.value = allChipFilters.school[0];
    }
    function toggleAllCol(col) {
      if (hiddenAllCols.includes(col)) hiddenAllCols = hiddenAllCols.filter(c=>c!==col);
      else hiddenAllCols.push(col);
      renderCurrentPage();
    }

    window.addEventListener('DOMContentLoaded', () => {
      const savedUser = localStorage.getItem('currentUser');
      if (savedUser) {
        try {
          const u = JSON.parse(savedUser);
          currentUser = u;
          document.getElementById('userBadge').innerText = `${u.username} (${u.role})`;
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('mainApp').classList.remove('hidden');
          if (u.role === 'CEO') initBranchDropdown();
          updateTheme();
          loadDashboardData().then(() => navigateTo('dashboard'));
        } catch(e) { clearLoginState(); }
      }
    });
  </script>
</body>
</html>
